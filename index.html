<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIT Roorkee Mission Control 🚀</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --success: #4ade80;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #f8fafc;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 450px;
        }
        .header h1 {
            font-size: 1.6rem;
            color: #f43f5e;
            margin: 5px 0;
            text-shadow: 0 0 10px rgba(244,63,94,0.5);
        }
        .header p {
            color: #94a3b8;
            margin: 0;
            font-size: 0.9rem;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            box-sizing: border-box;
            margin-bottom: 30px;
        }
        
        .mode-toggle-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(29, 78, 216, 0.6);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .mode-toggle-btn.editing {
            background: linear-gradient(135deg, #22c55e, #15803d);
            box-shadow: 0 5px 20px rgba(21, 128, 61, 0.6);
            transform: scale(1.05);
        }

        .input-panel {
            width: 100%;
            max-width: 450px;
            background: #1e293b;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            border: 1px solid #334155;
            display: none;
            gap: 8px;
            box-sizing: border-box;
            margin-bottom: 20px;
            flex-direction: column;
        }
        .input-row {
            display: flex;
            gap: 8px;
        }
        .input-panel input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
        }
        .input-time { width: 35%; }
        .input-task { width: 65%; flex-grow: 1; }
        .add-btn {
            background: #f43f5e;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            padding: 12px;
            width: 100%;
            margin-top: 5px;
        }

        .task-card {
            display: flex;
            align-items: center;
            background: #273549;
            padding: 14px 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            border-left: 5px solid var(--accent);
        }
        .task-card.completed {
            border-left-color: var(--success);
            opacity: 0.6;
            background: #1e293b;
        }
        .task-info {
            flex-grow: 1;
            margin-left: 12px;
            margin-right: 10px;
        }
        .time {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: bold;
            display: block;
        }
        .task-card.completed .time {
            color: #64748b;
        }
        .details {
            font-size: 1.05rem;
            font-weight: 500;
            margin-top: 2px;
            word-break: break-word;
        }
        .task-card.completed .details {
            text-decoration: line-through;
            color: #64748b;
        }
        
        .checkbox-container {
            position: relative;
            width: 25px;
            height: 25px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0; width: 0;
        }
        .checkmark {
            position: absolute;
            top: 0; left: 0;
            height: 25px; width: 25px;
            background-color: #475569;
            border-radius: 6px;
            transition: 0.2s;
        }
        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--success);
        }
        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 9px; top: 5px;
            width: 5px; height: 11px;
            border: solid #0f172a;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }
        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .delete-btn {
            display: none;
            background: none;
            border: none;
            color: #ef4444;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            flex-shrink: 0;
        }

        body.edit-mode .delete-btn {
            display: block;
        }
        body.edit-mode .checkbox-container {
            display: none;
        }
        body.edit-mode .input-panel {
            display: flex;
        }

        .popup-notice {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: linear-gradient(135deg, #f43f5e, #ec4899);
            color: white;
            padding: 20px 30px;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            z-index: 1000;
            width: 80%;
            max-width: 320px;
            font-size: 1.2rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .popup-notice.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .celebration-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .celebration-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .celebration-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #22c55e;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }
        .celebration-subtext {
            font-size: 1.4rem;
            color: #38bdf8;
            font-weight: bold;
            line-height: 1.4;
        }
        .close-btn {
            margin-top: 30px;
            background: #f43f5e;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .empty-msg {
            text-align: center;
            color: #64748b;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Today If Poora Diary Milk 🍫</h1>
    <p>Target: IIT Roorkee CSE 🎯</p>
</div>

<button class="mode-toggle-btn" id="toggle-btn" onclick="toggleEditMode()">✏️</button>

<div class="input-panel" id="input-panel">
    <div class="input-row">
        <input type="text" id="time-input" class="input-time" placeholder="Time (e.g., 09:00)">
        <input type="text" id="task-input" class="input-task" placeholder="Task ka naam...">
    </div>
    <button class="add-btn" onclick="addNewTask()">+ Add Task</button>
</div>

<div class="container" id="schedule-list">
    </div>

<div class="popup-notice" id="task-popup">
    आज पूरा करना है<br>IIT Roorkee cse के लिए ✨
</div>

<div class="celebration-overlay" id="grand-celebration">
    <div class="celebration-text">🎉 🌟 मिशन पूरा हुआ! 🌟 🎉</div>
    <div class="celebration-subtext">
        ऐसे ही shedule का task pura karte raho<br>
        <span style="color: #fbbf24; font-size: 1.6rem; display:block; margin-top:10px;">IIT Roorkee cse is waiting for you 🏛️</span>
    </div>
    <button class="close-btn" onclick="closeCelebration()">Close</button>
</div>

<script>
    const defaultSchedule = [
        { time: "07:00 - 08:00", task: "Pdf", completed: false },
        { time: "09:00 - 12:00", task: "2- Straight Line Lect", completed: false },
        { time: "12:00 - 01:45", task: "Electrostatics L1", completed: false },
        { time: "01:45 - 02:00", task: "Lunch Break 🍱", completed: false },
        { time: "02:00 - 04:00", task: "Straight Line", completed: false },
        { time: "04:00 - 05:30", task: "Chemical Bonding", completed: false },
        { time: "05:30 - 08:00", task: "Circle Revision Q/P", completed: false },
        { time: "08:00 - 08:30", task: "Dinner 🍲", completed: false },
        { time: "08:30 - 10:30", task: "Revision ➔ Adv Q", completed: false },
        { time: "10:30 - 11:00", task: "Quick review an shedule Next Day", completed: false }
    ];

    let mySchedule = JSON.parse(localStorage.getItem('jee_schedule')) || defaultSchedule;
    let isEditMode = false;

    const container = document.getElementById('schedule-list');
    const popup = document.getElementById('task-popup');
    const celebrationScreen = document.getElementById('grand-celebration');
    const toggleBtn = document.getElementById('toggle-btn');

    function toggleEditMode() {
        isEditMode = !isEditMode;
        if (isEditMode) {
            document.body.classList.add('edit-mode');
            toggleBtn.innerHTML = "✅"; 
            toggleBtn.classList.add('editing');
        } else {
            document.body.classList.remove('edit-mode');
            toggleBtn.innerHTML = "✏️"; 
            toggleBtn.classList.remove('editing');
            saveData();
        }
        renderSchedule();
    }

    function renderSchedule() {
        container.innerHTML = '';
        
        if (mySchedule.length === 0) {
            container.innerHTML = '<div class="empty-msg">कोई टास्क नहीं है। ✏️ पर क्लिक करके नया टास्क जोड़ें! 🎯</div>';
            return;
        }

        mySchedule.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = `task-card ${item.completed ? 'completed' : ''}`;
            card.id = `card-${index}`;
            
            card.innerHTML = `
                <label class="checkbox-container">
                    <input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleTask(${index}, this)">
                    <span class="checkmark"></span>
                </label>
                <div class="task-info">
                    <span class="time">${item.time}</span>
                    <span class="details">${item.task}</span>
                </div>
                <button class="delete-btn" onclick="deleteTask(${index})">🗑️</button>
            `;
            container.appendChild(card);
        });
    }

    function toggleTask(index, checkbox) {
        mySchedule[index].completed = checkbox.checked;
        saveData();
        
        const card = document.getElementById(`card-${index}`);
        if (checkbox.checked) {
            card.classList.add('completed');
            showPopupNotification();
            triggerSingleConfetti();
            checkAllCompleted();
        } else {
            card.classList.remove('completed');
        }
    }

    function addNewTask() {
        const timeInput = document.getElementById('time-input');
        const taskInput = document.getElementById('task-input');

        if (!taskInput.value.trim()) {
            alert("कृपया टास्क का नाम लिखें!");
            return;
        }

        const newTime = timeInput.value.trim() || "Anytime";
        
        mySchedule.push({
            time: newTime,
            task: taskInput.value.trim(),
            completed: false
        });

        saveData();
        renderSchedule();

        timeInput.value = '';
        taskInput.value = '';
    }

    function deleteTask(index) {
        mySchedule.splice(index, 1);
        saveData();
        renderSchedule();
    }

    function saveData() {
        localStorage.setItem('jee_schedule', JSON.stringify(mySchedule));
    }

    function showPopupNotification() {
        popup.classList.add('show');
        setTimeout(() => {
            popup.classList.remove('show');
        }, 2000);
    }

    function triggerSingleConfetti() {
        confetti({
            particleCount: 40,
            spread: 60,
            origin: { y: 0.7 }
        });
    }

    function checkAllCompleted() {
        if (mySchedule.length === 0) return;
        const allDone = mySchedule.every(item => item.completed);
        if (allDone) {
            setTimeout(() => {
                celebrationScreen.classList.add('show');
                runFilmiCelebration();
            }, 600);
        }
    }

    function runFilmiCelebration() {
        var duration = 5 * 1000;
        var end = Date.now() + duration;

        (function frame() {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
            if (Date.now() < end) { requestAnimationFrame(frame); }
        }());
    }

    function closeCelebration() {
        celebrationScreen.classList.remove('show');
    }

    renderSchedule();
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registered! 🎉'))
        .catch(err => console.log('Service Worker error:', err));
    });
  }
</script>

</body>
</html>
